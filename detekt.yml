# Detekt configuration — keep defaults tight, use @Suppress for justified exceptions.
# Only override thresholds where the default is genuinely too strict for the domain.

style:
  # Status check functions use early returns idiomatically (default: 2)
  ReturnCount:
    max: 8
  # Loops with multiple continues for skip-fainted/skip-immune patterns (default: 1)
  LoopWithTooManyJumpStatements:
    maxJumpCount: 3
  # Move pool definitions in tests can be long (default: 120)
  MaxLineLength:
    maxLineLength: 140
  # Pokemon domain constants (stat stages, HP fractions, multipliers) are
  # inherent to game formulas and read clearer as literals
  MagicNumber:
    active: false

naming:
  # Stats.kt contains StatStages + helper functions — concept file
  MatchingDeclarationName:
    active: false
