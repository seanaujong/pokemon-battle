complexity:
  # TextRenderer.render() is an exhaustive when over all event types
  CyclomaticComplexMethod:
    threshold: 25
  # Integration code (Main.kt, scenario tests) is naturally longer
  LongMethod:
    threshold: 80
  # BattleState.doubles() factory is intentionally parameter-heavy
  LongParameterList:
    functionThreshold: 9
    constructorThreshold: 9
  # TextRenderer has one render function per event type
  TooManyFunctions:
    thresholdInObjects: 25
  # TypeAI.pickBestMove has nested loops for move × target scoring
  NestedBlockDepth:
    threshold: 5

style:
  # Status check functions use early returns idiomatically
  ReturnCount:
    max: 8
  # Loops with multiple continues for skip-fainted/skip-immune patterns
  LoopWithTooManyJumpStatements:
    maxJumpCount: 3
  # Move pool definitions in tests can be long
  MaxLineLength:
    maxLineLength: 140
  # Pokemon domain constants (stat stages ±6, HP fractions 1/16, STAB 1.5x,
  # IV bounds 0-31, EV bounds 0-252) are inherent to game formulas.
  # "maxHp / 16" reads clearer than "maxHp / BURN_DAMAGE_FRACTION" in context.
  MagicNumber:
    active: false

naming:
  # Stats.kt contains StatStages + helper functions — concept file
  MatchingDeclarationName:
    active: false
